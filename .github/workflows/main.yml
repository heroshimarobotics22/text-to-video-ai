name: AI Video Generator

on:
  schedule:
    - cron: '0 3 * * 1,3,5'  # Mon, Wed, Fri 8:30 AM IST
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate AI Tools Video
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        run: python app.py "Top 5 New AI Tools This Week"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v3
        with:
          name: generated-video
          path: "*.mp4"
